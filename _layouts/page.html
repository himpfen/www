---
layout: default
---
<section class="page-hero py-5">
  <div class="container-xl">
    {% if page.kicker %}<p class="text-secondary mb-2">{{ page.kicker }}</p>{% endif %}
    <h1 class="display-5 fw-semibold tracking-tight mb-3">{{ page.title }}</h1>
    {% if page.description %}<p class="lead text-secondary max-copy mb-0">{{ page.description }}</p>{% endif %}
  </div>
</section>

<section class="py-5">
  <div class="container-xl page-content">
    {{ content }}
  </div>
</section>
