---
layout: default
---
<article>
  <header class="page-hero py-5">
    <div class="container-xl">
      <p class="text-secondary mb-2">{{ page.date | date: "%B %-d, %Y" }}</p>
      <h1 class="display-5 fw-semibold tracking-tight mb-3">{{ page.title }}</h1>
      {% if page.description %}<p class="lead text-secondary max-copy mb-0">{{ page.description }}</p>{% endif %}
    </div>
  </header>

  <section class="py-5">
    <div class="container-xl">
      <div class="article-body">
        {{ content }}
      </div>
    </div>
  </section>
</article>
